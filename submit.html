<!DOCTYPE html>
<html>

<head>
    <title>Submit Challenge</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav>
        <a href="index.html">Challenge</a>
        <a href="history.html">History</a>
        <a href="submit.html">Submit</a>
        <a href="stats.html">Stats</a>
        <a href="settings.html">Settings</a>
    </nav>

    <h1>➕ Add Challenge</h1>

    <input id="input" placeholder="Enter challenge">
    <button onclick="add()">Add</button>

    <script>
        function add() {
            let custom = JSON.parse(localStorage.getItem("custom")) || [];
            let value = document.getElementById("input").value;

            if (value.trim() === "") return alert("Enter something!");

            custom.push(value);
            localStorage.setItem("custom", JSON.stringify(custom));

            alert("Added!");
        }

        let theme = localStorage.getItem("theme") || "dark";
        document.body.className = theme;
    </script>

</body>

</html>
